<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Hardest Banners</title>
    <!-- Fuente Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pantalla de carga con el logo girando -->
    <div id="loader-wrapper">
        <img src="logo.png" alt="Cargando..." class="loader">
    </div>

    <!-- Contenido Principal -->
    <div id="main-content" class="hidden">
        <img src="logo.png" class="top-right-logo" alt="Logo Top Hardest">
        
        <div class="rgb-wrapper">
            <div class="rgb-animated-border"></div>
            <main class="main-layout download-card">
                <!-- Columna Izquierda: Área de Previews -->
                <div class="left-column">
                    <div class="preview-area" id="preview-container">
                        <div id="default-gallery" class="gallery-vertical">
                            <img src="assets/Zephyr - 1.png" class="gallery-item" data-value="top1" alt="Top 1">
                            <img src="assets/Hal  - 2.png" class="gallery-item" data-value="top2" alt="Top 2">
                            <img src="assets/Dest - 3.png" class="gallery-item" data-value="top3" alt="Top 3">
                            <img src="assets/WilsonMC - 4.png" class="gallery-item" data-value="top4" alt="Top 4">
                            <img src="assets/SavsxZ - 5.png" class="gallery-item" data-value="top5" alt="Top 5">
                            <img src="assets/Xpr0ShaderX GD - 6.png" class="gallery-item" data-value="top6" alt="Top 6">
                            <img src="assets/Lestram - 7.png" class="gallery-item" data-value="top7" alt="Top 7">
                            <img src="assets/Jdap18 - 8.png" class="gallery-item" data-value="top8" alt="Top 8">
                            <img src="assets/CesarGDD - 9.png" class="gallery-item" data-value="top9" alt="Top 9">
                            <img src="assets/SrSillir - 10.png" class="gallery-item" data-value="top10" alt="Top 10">
                            <img src="assets/Daniel - 11.png" class="gallery-item" data-value="top11" alt="Top 11">
                            <img src="assets/Benji - 12.png" class="gallery-item" data-value="top12" alt="Top 12">
                            <img src="assets/AndresGaming - 13.png" class="gallery-item" data-value="top13" alt="Top 13">
                            <img src="assets/Kuzz - 14.png" class="gallery-item" data-value="top14" alt="Top 14">
                        </div>
                        <img id="banner-preview" src="" alt="Vista previa" class="hidden">
                    </div>
                </div>

                <!-- Columna Derecha: Filtros y Botón -->
                <div class="right-column">
                    <div class="filter-controls">
                        <label for="player-select">Elige tu banner:</label>
                        <div class="custom-dropdown" id="custom-dropdown">
                            <div class="dropdown-selected" id="dropdown-selected">
                                <span id="dropdown-text">Selecciona un banner</span>
                                <svg class="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </div>
                            <div class="dropdown-options hidden" id="dropdown-options">
                                <div class="dropdown-option" data-value="top1">Top 1 - Zephyr</div>
                                <div class="dropdown-option" data-value="top2">Top 2 - Hal</div>
                                <div class="dropdown-option" data-value="top3">Top 3 - Dest</div>
                                <div class="dropdown-option" data-value="top4">Top 4 - WilsonMC</div>
                                <div class="dropdown-option" data-value="top5">Top 5 - SavsxZ</div>
                                <div class="dropdown-option" data-value="top6">Top 6 - Xpr0ShaderX GD</div>
                                <div class="dropdown-option" data-value="top7">Top 7 - Lestram</div>
                                <div class="dropdown-option" data-value="top8">Top 8 - Jdap18</div>
                                <div class="dropdown-option" data-value="top9">Top 9 - CesarGDD</div>
                                <div class="dropdown-option" data-value="top10">Top 10 - SrSillir</div>
                                <div class="dropdown-option" data-value="top11">Top 11 - Daniel</div>
                                <div class="dropdown-option" data-value="top12">Top 12 - Benji</div>
                                <div class="dropdown-option" data-value="top13">Top 13 - AndresGaming</div>
                                <div class="dropdown-option" data-value="top14">Top 14 - Kuzz</div>
                            </div>
                        </div>
                        <!-- Input oculto para mantener la lógica original de JS -->
                        <input type="hidden" id="player-select" value="">

                        <button id="download-btn" disabled>Descargar Banner</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
